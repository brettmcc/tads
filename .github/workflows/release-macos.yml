# Builds the macOS installer (dmg + zip) and attaches it to the GitHub
# Release that triggered the workflow. macOS installers can only be built
# on a Mac, so this runs in CI; Windows and Linux installers are built
# and uploaded from dev machines (see README "Installing Tads").
name: release-macos

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the macOS build to (e.g. v0.14.0)"
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      - name: Build macOS installers (arm64 + x64)
        # invoke the workspace script directly: args after -- don't survive
        # the root script's nested "npm run -w" indirection
        run: npm run dist:mac -w packages/tad-app -- --arm64 --x64
        env:
          # unsigned build: no signing identity, and tools/notarize.js
          # skips notarization when APPLEID is not set
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: |
          shopt -s nullglob
          gh release upload "$TAG" \
            packages/tad-app/release/*.dmg \
            packages/tad-app/release/*.dmg.blockmap \
            packages/tad-app/release/*-mac.zip \
            packages/tad-app/release/*-mac.zip.blockmap \
            --clobber
